<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="icon" href="Weather-App/Weather-Icons/weather-icon.png">
</head>
<link rel="stylesheet" href="WeatherApp.css">
<body>
    <div class="weather-app">
        <div class="input-section">
            <input type="text" id="input-city" placeholder="Enter city name">
            <button id="search-btn">🔍︎</button>
        </div>
        <div class="weather-info">
            <div class="weather">
                <img src="Weather-Icons/clear.png" alt="" id="weather-icon">
                <h1 id="temp">-°c</h1>
                <h3 id="city-name">City Name</h3>
            </div>
            <div class="humi-wind">
                <div class="col">
                <img src="Weather-Icons/humidity.png" alt="">
                    <div>
                        <p class="label">Humidity</p>
                        <p id="humidity">- %</p>
                    </div>
            </div>
                <div class="col">
                <img src="Weather-Icons/wind.png" alt="">
                    <div>
                        <p class="label">Wind</p>
                        <p id="wind">- km/h</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="WeatherApp.js"></script>
</body>
</html>
